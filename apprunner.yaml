version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm ci
    build:
      - npm run build:docker
run:
  runtime-version: 22
  command: node .next/standalone/server.js
  network:
    port: 3000
  env:
    - name: HOSTNAME
      value: "0.0.0.0"
    - name: NODE_ENV
      value: "production"
