# Nginx reverse proxy for kids-assessment
# 1. Replace YOUR_DOMAIN with your domain or EC2 public DNS
# 2. sudo cp deploy/nginx-kids-assessment.conf /etc/nginx/sites-available/kids-assessment
# 3. sudo ln -sf /etc/nginx/sites-available/kids-assessment /etc/nginx/sites-enabled/
# 4. sudo rm -f /etc/nginx/sites-enabled/default
# 5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
